services:
  db:
    image: postgres:17-alpine
    container_name: PopScope_DB
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - '${POSTGRES_HOST_PORT:-5433}:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}']
      interval: 5s
      timeout: 5s
      retries: 20

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: popscope-backend
    env_file:
      - .env
    environment:
      APP_ENV: dev
      APP_DEBUG: 'true'
      REPORT_USE_LLM: 'false'
      LLM_PROVIDER: stub
    depends_on:
      db:
        condition: service_healthy
    ports:
      - '8000:8000'
    volumes:
      - ./backend:/app
    command: sh -c "python -m alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

  data-import:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: popscope-data-import
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: sh -c "python -m alembic upgrade head && python seed/seed.py"
    profiles:
      - data-seed

volumes:
  postgres_data:
